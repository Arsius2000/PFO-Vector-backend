basePath: /
definitions:
  internal_handler.AddUserAchievementRequest:
    properties:
      achievement_id:
        type: integer
      user_id:
        type: integer
    type: object
  internal_handler.AddUserEventRequest:
    properties:
      event_id:
        type: integer
    type: object
  internal_handler.CreateAchievementRequest:
    properties:
      achivements_name:
        type: string
      condition_type:
        type: string
      condition_value:
        type: integer
      description:
        type: string
      icon_name:
        type: string
    type: object
  internal_handler.CreateEventRequest:
    properties:
      audience:
        example: A-217
        type: string
      end_time:
        example: "13:00"
        type: string
      event_date:
        example: 21.02.2007
        type: string
      participants_limit:
        type: integer
      start_time:
        example: "12:00"
        type: string
      title:
        example: Бойцы гладят скатерти
        type: string
      weight:
        type: integer
    type: object
  internal_handler.CreateUserRequest:
    properties:
      avatar_url:
        type: string
      direction_vector:
        example: Экскурсовод
        type: string
      full_name:
        example: Иван Иванов
        type: string
      gender:
        example: Мужской
        type: string
      phone_number:
        example: "89889993556"
        type: string
      rating:
        description: Если nil -> БД поставит 0
        type: integer
      study_group:
        example: ЭФБО-05-25
        type: string
      telegram:
        description: Обязательно (NOT NULL в БД)
        example: '@Ivan337'
        type: string
      visited_events_count:
        description: Если nil -> БД поставит 0
        type: integer
    type: object
  internal_handler.TelegramAuthRequest:
    properties:
      phone_number:
        type: string
      telegram_id:
        type: integer
      username:
        type: string
    type: object
  internal_handler.UpdateUserRequest:
    properties:
      avatar_url:
        type: string
      direction_vector:
        type: string
      full_name:
        type: string
      gender:
        type: string
      phone_number:
        type: string
      rating:
        type: integer
      role:
        type: string
      study_group:
        type: string
      telegram:
        type: string
      visited_events_count:
        type: integer
    type: object
  pfo-vector_internal_model.AchievementResponse:
    properties:
      achivements_name:
        type: string
      condition_type:
        type: string
      condition_value:
        type: integer
      description:
        type: string
      icon_name:
        type: string
      id:
        type: integer
    type: object
  pfo-vector_internal_model.EventResponse:
    properties:
      audience:
        type: string
      created_by:
        type: integer
      end_time:
        type: string
      event_date:
        type: string
      id:
        type: integer
      participants_current:
        type: integer
      participants_limit:
        type: integer
      start_time:
        type: string
      title:
        type: string
      weight:
        type: integer
    type: object
  pfo-vector_internal_model.EventsListResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/pfo-vector_internal_model.EventResponse'
        type: array
      pagination:
        $ref: '#/definitions/pfo-vector_internal_model.Pagination'
    type: object
  pfo-vector_internal_model.ImportResult:
    properties:
      created:
        type: integer
      errors:
        items:
          $ref: '#/definitions/pfo-vector_internal_model.RowError'
        type: array
      failed:
        type: integer
      total_rows:
        type: integer
    type: object
  pfo-vector_internal_model.Pagination:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      page:
        type: integer
    type: object
  pfo-vector_internal_model.RowError:
    properties:
      field:
        type: string
      reason:
        type: string
      row:
        type: integer
    type: object
  pfo-vector_internal_model.TelegramAuthResponse:
    properties:
      message:
        type: string
      status:
        type: string
      token:
        type: string
      user_id:
        type: integer
    type: object
  pfo-vector_internal_model.TelegramCheckResponse:
    properties:
      exists:
        type: boolean
      message:
        type: string
      status:
        type: string
      user_id:
        type: integer
    type: object
  pfo-vector_internal_model.UserAchievementListResponse:
    properties:
      achievement_list_response:
        items:
          $ref: '#/definitions/pfo-vector_internal_model.AchievementResponse'
        type: array
      pagination:
        $ref: '#/definitions/pfo-vector_internal_model.Pagination'
      user_id:
        type: integer
    type: object
  pfo-vector_internal_model.UserListResponse:
    properties:
      pagination:
        $ref: '#/definitions/pfo-vector_internal_model.Pagination'
      users:
        items:
          $ref: '#/definitions/pfo-vector_internal_model.UserResponse'
        type: array
    type: object
  pfo-vector_internal_model.UserResponse:
    properties:
      avatar_url:
        type: string
      direction_vector:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      join_date:
        type: string
      phone_number:
        type: string
      rating:
        type: integer
      role:
        type: string
      study_group:
        type: string
      telegram:
        type: string
      visited_events_count:
        type: integer
    type: object
info:
  contact: {}
  description: API сервер для управления пользователями
  title: My Project API
  version: "1.0"
paths:
  /achievement/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает данные достижения по ID
      parameters:
      - description: ID достижения
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные достижения
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.AchievementResponse'
        "404":
          description: Достижение не найдено
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение достижения
      tags:
      - achievement
  /achievement/add:
    post:
      consumes:
      - application/json
      description: Создает нового достижения с переданными данными
      parameters:
      - description: Данные достижения
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateAchievementRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Достижение успешно создан
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.AchievementResponse'
        "400":
          description: Неверный формат запроса или валидация не пройдена
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создание достижения
      tags:
      - achievement
  /achievement/all:
    get:
      consumes:
      - application/json
      description: Возвращает данные достижений по ID
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Размер страницы
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные пользователей с пагинацией
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserListResponse'
        "404":
          description: Ошибка получения списка пользователей
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение всех достижений
      tags:
      - achievement
  /auth/check/{phone_number}:
    get:
      consumes:
      - application/json
      description: Проверяет, существует ли пользователь по номеру телефона
      parameters:
      - description: Phone Number
        in: path
        name: phone_number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Результат проверки
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.TelegramCheckResponse'
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Проверка существования пользователя по номеру телефона
      tags:
      - auth
  /auth/exchange-code/{code}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Временный код
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Успешно, JWT в cookie
          schema:
            type: string
        "400":
          description: Неверный код
          schema:
            type: string
      summary: Обмен кода на JWT (в HttpOnly Cookie)
      tags:
      - auth
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Авторизация только для существующих пользователей. Автоматически
        обновляет telegram username
      parameters:
      - description: Данные от Телеграм-бота
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.TelegramAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешная авторизация
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.TelegramAuthResponse'
        "400":
          description: Неверный формат запроса
          schema:
            type: string
        "401":
          description: Пользователь не найден
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Авторизация через Telegram
      tags:
      - auth
  /events/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает данные мероприятия по ID
      parameters:
      - description: ID мероприятия
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные мероприятия
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.EventResponse'
        "404":
          description: Мероприятие не найдено
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение мероприятия
      tags:
      - events
  /events/add:
    post:
      consumes:
      - application/json
      description: Создает новое мероприятие с переданными данными
      parameters:
      - description: Данные мероприятия
        in: body
        name: event
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Мероприятие успешно создано
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.EventResponse'
        "400":
          description: Неверный формат запроса или валидация не пройдена
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создание мероприятия
      tags:
      - events
  /events/all:
    get:
      consumes:
      - application/json
      description: Возвращает данные мероприятий по ID
      parameters:
      - default: all
        description: Фильтр статуса
        enum:
        - all
        - past
        - ongoing
        - upcoming
        in: query
        name: filter
        type: string
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Размер страницы
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные   с пагинацией
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.EventsListResponse'
        "404":
          description: Ошибка получения списка мероприятий
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение всех мероприятий
      tags:
      - events
  /profile:
    get:
      consumes:
      - application/json
      description: Возвращает данные пользователя из jwt
      produces:
      - application/json
      responses:
        "200":
          description: Данные пользователя
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserResponse'
        "404":
          description: Пользователь не найден
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение пользователя
      tags:
      - profile
  /profile/{user_id}/achievements:
    get:
      consumes:
      - application/json
      description: Возвращает список достижений по ID
      parameters:
      - description: ID пользователя
        in: path
        name: user_id
        required: true
        type: integer
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Размер страницы
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные мероприятий пользователя с пагинацией
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserAchievementListResponse'
        "400":
          description: Некорректный user_id
          schema:
            type: string
        "500":
          description: Ошибка получения списка достижений
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение всех достижений пользователя
      tags:
      - profile
  /profile/{user_id}/events:
    get:
      consumes:
      - application/json
      description: Возвращает список мероприятий по ID
      parameters:
      - description: ID пользователя
        in: path
        name: user_id
        required: true
        type: integer
      - default: all
        description: Фильтр статуса
        enum:
        - all
        - past
        - ongoing
        - upcoming
        in: query
        name: filter
        type: string
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Размер страницы
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные мероприятий пользователя с пагинацией
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.EventsListResponse'
        "400":
          description: Некорректный user_id
          schema:
            type: string
        "500":
          description: Ошибка получения списка мероприятий
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение всех мероприятий пользователя
      tags:
      - profile
  /profile/achievement/add:
    post:
      consumes:
      - application/json
      description: Добавляет достижения пользователю
      parameters:
      - description: Данные о пользователе и достижении
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/internal_handler.AddUserAchievementRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Достижение присвоенно
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Добавление достижения пользователю
      tags:
      - profile
  /profile/event/add:
    post:
      consumes:
      - application/json
      description: Добавляет мероприятие пользователю
      parameters:
      - description: Данные о пользователе и мероприятии
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/internal_handler.AddUserEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Записан на мероприятие
          schema:
            type: string
        "409":
          description: конфликт записей
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Добавление мероприятия пользователю
      tags:
      - profile
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Удаляет пользователя по ID
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь удален
          schema:
            type: string
        "204":
          description: Пользователь удален
          schema:
            type: string
        "404":
          description: Пользователь не найден
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Удаление пользователя
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Возвращает данные пользователя по ID
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные пользователя
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserResponse'
        "404":
          description: Пользователь не найден
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение пользователя
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Частично обновляет данные пользователя по ID
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для обновления
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно обновлен
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserResponse'
        "400":
          description: Неверный формат запроса
          schema:
            type: string
        "404":
          description: Пользователь не найден
          schema:
            type: string
        "409":
          description: Пользователь с таким telegram_id уже существует
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Обновление пользователя
      tags:
      - users
  /users/add:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя с переданными данными
      parameters:
      - description: Данные пользователя
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь успешно создан
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserResponse'
        "400":
          description: Неверный формат запроса или валидация не пройдена
          schema:
            type: string
        "409":
          description: Пользователь с таким telegram_id уже существует
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создание пользователя
      tags:
      - users
  /users/all:
    get:
      consumes:
      - application/json
      description: Возвращает данные пользователей по ID
      parameters:
      - default: name
        description: Сортировка пользователей
        enum:
        - name
        - role
        - rating
        in: query
        name: sort
        type: string
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Размер страницы
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные пользователей с пагинацией
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.UserListResponse'
        "404":
          description: Ошибка получения списка пользователей
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение всех пользователей
      tags:
      - users
  /users/import-users:
    post:
      consumes:
      - multipart/form-data
      description: Загружает Excel-файл и импортирует пользователей
      parameters:
      - description: Excel файл (.xlsx)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Импорт завершён
          schema:
            $ref: '#/definitions/pfo-vector_internal_model.ImportResult'
        "400":
          description: Некорректный файл или данные
          schema:
            type: string
        "409":
          description: Конфликт уникальных данных
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Импорт пользователей из Excel
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
